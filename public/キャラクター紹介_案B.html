:root{
  --ink:#07090f; --navy-950:#0a0f1d; --navy-900:#0e1424; --navy-800:#121a30;
  --navy-700:#1a2440; --navy-600:#24325a;
  --panel:rgba(16,22,40,.75); --panel-solid:#10162a;
  --ivory:#f2eee6; --ivory-dim:#cfd3de; --muted:#8b93a8;
  --pink:#e9b7c7; --pink-bright:#f3cdd9; --pink-deep:#c98da1;
  --pink-glow:rgba(233,183,199,.28);
  --line:rgba(233,183,199,.14); --line-strong:rgba(233,183,199,.4);
  --line-navy:rgba(84,110,170,.25);
  --font-display:"Cormorant Garamond","Shippori Mincho","Yu Mincho",serif;
  --font-mincho:"Shippori Mincho","Yu Mincho","Hiragino Mincho ProN",serif;
  --font-body:"Zen Kaku Gothic New","Hiragino Kaku Gothic ProN","Yu Gothic",sans-serif;
  --font-script:"RusLoveAndPassion","Georgia",serif;
  --font-en-deco:"LovelyValentine","Georgia",serif;
  --ease-out:cubic-bezier(.16,1,.3,1);
  /* per-class color is applied to the ambient background/watermark only (via JS);
     all UI accents stay pink so the page reads as one system with the app */
  --acc:var(--pink);
}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;overflow:hidden;}
body{background:var(--ink);color:var(--ivory);
  font-family:var(--font-body);font-weight:300;letter-spacing:.04em;
  perspective:2200px;perspective-origin:50% 50%;-webkit-font-smoothing:antialiased;}
::selection{background:var(--pink-glow);color:var(--ivory);}

#bg{position:fixed;inset:0;transition:background 1s ease;z-index:0;}
#vignette{position:fixed;inset:0;background:radial-gradient(ellipse at 64% 48%,transparent 26%,var(--ink) 88%);z-index:2;pointer-events:none;}

/* ===== flip-book page-turn ===== */
#book{position:fixed;inset:0;z-index:7;pointer-events:none;transform-style:preserve-3d;}
.leaf{position:absolute;top:0;bottom:0;width:50%;backface-visibility:hidden;
  background:linear-gradient(100deg,var(--navy-900) 0%,var(--navy-700) 45%,var(--navy-950) 100%);
  box-shadow:inset 0 0 90px rgba(0,0,0,.75);opacity:0;}
.leaf::after{content:"";position:absolute;inset:0;
  background:repeating-linear-gradient(0deg,rgba(255,255,255,.028) 0 2px,transparent 2px 5px);}
#leafR{right:0;transform-origin:left center;}
#book.next #leafR{animation:turnNext .78s cubic-bezier(.36,0,.2,1) both;}
@keyframes turnNext{0%{opacity:1;transform:rotateY(0);filter:brightness(1);}55%{opacity:1;filter:brightness(.55);}100%{opacity:0;transform:rotateY(-172deg);filter:brightness(.2);}}
#leafL{left:0;transform-origin:right center;}
#book.prev #leafL{animation:turnPrev .78s cubic-bezier(.36,0,.2,1) both;}
@keyframes turnPrev{0%{opacity:1;transform:rotateY(0);filter:brightness(1);}55%{opacity:1;filter:brightness(.55);}100%{opacity:0;transform:rotateY(172deg);filter:brightness(.2);}}
#spine{position:fixed;left:50%;top:0;bottom:0;width:60px;margin-left:-30px;z-index:8;pointer-events:none;
  background:linear-gradient(90deg,transparent,rgba(0,0,0,.6) 40%,rgba(0,0,0,.6) 60%,transparent);opacity:0;}
#book.next #spine,#book.prev #spine{animation:spinefade .78s ease both;}
@keyframes spinefade{0%{opacity:.9;}100%{opacity:0;}}

/* ===== class-code watermark ===== */
#codelayer{position:fixed;inset:0;z-index:1;pointer-events:none;user-select:none;display:flex;flex-direction:column;align-items:center;justify-content:center;}
#code{font-family:var(--font-display);font-weight:500;font-size:20vw;line-height:1.5;letter-spacing:.06em;
  padding:.35em .35em .2em;overflow:visible;white-space:nowrap;text-align:center;
  background:linear-gradient(165deg,var(--ivory) 6%,var(--pink) 55%,rgba(255,255,255,.10) 100%);
  -webkit-background-clip:text;background-clip:text;color:transparent;opacity:.5;}
#codebar{width:8vw;height:1px;margin-top:-.2em;opacity:.6;background:linear-gradient(90deg,transparent,var(--pink),transparent);}
#codelayer.enter{animation:codein .9s var(--ease-out) both;}
@keyframes codein{from{opacity:0;transform:translateY(26px) scale(.97);}to{opacity:1;transform:none;}}

/* ===== character art ===== */
#charveil{position:fixed;right:0;top:0;bottom:0;width:60vw;z-index:3;pointer-events:none;}
#charveil img{position:absolute;right:2vw;top:50%;transform:translateY(-50%);height:94vh;max-width:56vw;object-fit:contain;object-position:center;opacity:.30;filter:blur(.4px) saturate(.72);}
#charbox{position:fixed;right:0;top:0;bottom:0;width:60vw;z-index:4;}
#charbox img.main{position:absolute;right:2vw;top:50%;transform:translateY(-50%);height:94vh;max-width:56vw;object-fit:contain;object-position:center;opacity:0;transition:opacity 1.2s ease;filter:drop-shadow(0 18px 50px rgba(0,0,0,.7)) saturate(.92);}
#charbox img.main.show{opacity:1;animation:kenburns 10s ease-in-out infinite alternate;}
@keyframes kenburns{from{transform:translateY(-50%) scale(1);}to{transform:translateY(-50%) scale(1.04);}}
#charbox.enter img.main.show{animation:pagein .8s .30s var(--ease-out) both,kenburns 10s 1.2s ease-in-out infinite alternate;}
@keyframes pagein{0%{opacity:0;transform:translateY(-50%) translateX(70px) scale(1.06);filter:blur(9px) brightness(1.6);}100%{opacity:1;transform:translateY(-50%) translateX(0) scale(1);filter:blur(0) brightness(1) drop-shadow(0 18px 50px rgba(0,0,0,.7));}}
#charbox img.ghost{position:absolute;top:50%;transform:translateY(-50%);height:76vh;max-width:40vw;object-fit:contain;object-position:center;opacity:0;filter:grayscale(85%) blur(1.2px) brightness(.65);pointer-events:none;}
#charbox img.g1{right:32vw;}#charbox img.g2{right:44vw;height:64vh;}
#charbox img.g1{opacity:.15;}#charbox img.g2{opacity:.08;}
#charbox.enter img.g1{animation:ghostin .9s .42s var(--ease-out) both;}
#charbox.enter img.g2{animation:ghostin 1s .52s var(--ease-out) both;}
@keyframes ghostin{from{opacity:0;transform:translateY(-50%) translateX(60px);}to{opacity:.15;transform:translateY(-50%) translateX(0);}}

/* ===== left info panel ===== */
#info{position:fixed;left:5vw;top:56%;transform:translateY(-50%);max-width:38vw;z-index:5;}
#info.enter{animation:infoin .65s .34s var(--ease-out) both;}
@keyframes infoin{from{transform:translateY(calc(-50% + 22px));opacity:0;}to{transform:translateY(-50%);opacity:1;}}
#namewrap{display:flex;align-items:center;gap:14px;margin:0 0 16px;}
#btnicon{width:50px;height:50px;border-radius:50%;background:rgba(255,255,255,.05);border:1px solid var(--line);padding:5px;display:none;}
h1{font-family:var(--font-mincho);font-weight:500;font-size:clamp(26px,3.2vw,42px);letter-spacing:.14em;line-height:1.25;color:var(--ivory);}
h1 small{display:block;font-family:var(--font-display);font-size:13px;font-weight:500;color:var(--pink);letter-spacing:.34em;margin-bottom:6px;text-transform:none;}

#profile{margin-bottom:20px;}
.pf{display:flex;align-items:baseline;gap:14px;margin-bottom:9px;}
.pf b{font-family:var(--font-display);font-size:12px;font-weight:500;color:var(--pink);letter-spacing:.24em;min-width:82px;}
.pf i{font-style:normal;font-size:14.5px;color:var(--ivory);letter-spacing:.06em;}
.pf i.empty{color:var(--muted);font-size:13px;}

.label{font-family:var(--font-display);font-size:11px;letter-spacing:.3em;color:var(--pink-deep);margin-bottom:9px;text-transform:none;}
#weapons{display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap;}
.wtab{appearance:none;border:1px solid var(--line-navy);background:rgba(7,9,15,.75);color:var(--ivory-dim);
  border-radius:1px;padding:5px 14px;font-size:11px;letter-spacing:.12em;cursor:pointer;font-family:inherit;
  transition:border-color .2s var(--ease-out),color .2s var(--ease-out),background .2s var(--ease-out);}
.wtab:hover{border-color:var(--pink-deep);color:var(--ivory);}
.wtab.on{background:rgba(233,183,199,.08);border-color:var(--pink);color:var(--pink);}
#intro{font-family:var(--font-body);font-size:13.5px;line-height:2;color:var(--ivory-dim);min-height:56px;margin-bottom:22px;border-left:2px solid var(--pink);padding-left:16px;letter-spacing:.04em;}
#cta{display:inline-block;text-decoration:none;font-family:var(--font-body);font-weight:500;font-size:12px;letter-spacing:.16em;color:var(--ink);
  background:var(--pink);border:1px solid var(--pink);border-radius:1px;padding:12px 28px;
  transition:background .2s var(--ease-out),box-shadow .2s var(--ease-out),border-color .2s var(--ease-out);}
#cta:hover{background:var(--pink-bright);border-color:var(--pink-bright);box-shadow:0 0 24px var(--pink-glow);}

/* ===== corner wordmark (content name + TOP link, matches app Shell) ===== */
#home{position:fixed;left:20px;top:16px;z-index:6;display:flex;align-items:baseline;gap:14px;
  background:rgba(7,9,15,.7);backdrop-filter:blur(10px);border:1px solid var(--line);border-radius:2px;padding:9px 16px;}
#home .hm-context{font-family:var(--font-mincho);font-size:13px;letter-spacing:.22em;color:var(--ivory);}
#home .hm-top{font-family:var(--font-mincho);font-size:11px;letter-spacing:.3em;color:var(--pink);text-decoration:none;transition:color .2s;}
#home .hm-top:hover{color:var(--ivory);}

/* ===== prev / next ===== */
.arrow{position:fixed;top:50%;transform:translateY(-50%);z-index:6;width:50px;height:50px;border-radius:50%;
  border:1px solid var(--line-strong);background:rgba(7,9,15,.8);backdrop-filter:blur(10px);color:var(--ivory);
  font-size:15px;cursor:pointer;transition:background .2s var(--ease-out),color .2s var(--ease-out),border-color .2s var(--ease-out),box-shadow .2s var(--ease-out);}
.arrow:hover{background:var(--pink);color:var(--ink);border-color:var(--pink);box-shadow:0 0 20px var(--pink-glow);}
#prev{left:20px;}#next{right:20px;}

/* ===== bottom bar (footer idiom) ===== */
#bottom{position:fixed;left:0;right:0;bottom:0;z-index:6;display:flex;align-items:center;gap:20px;padding:14px 24px;
  border-top:1px solid var(--line);background:linear-gradient(transparent,rgba(7,9,15,.92));}
#unofficial{font-family:var(--font-body);font-size:10.5px;letter-spacing:.1em;color:var(--muted);white-space:nowrap;}
#counter{font-family:var(--font-display);font-size:13px;color:var(--ivory-dim);font-variant-numeric:tabular-nums;min-width:64px;letter-spacing:.12em;}
#counter b{color:var(--pink);font-size:16px;}
#bar{flex:1;height:2px;background:var(--line);border-radius:2px;overflow:hidden;}
#barfill{height:100%;width:0;background:var(--pink);transition:width .4s ease;}
#listbtn{border:1px solid var(--line-strong);background:transparent;color:var(--ivory);border-radius:1px;padding:8px 18px;font-size:11px;letter-spacing:.2em;cursor:pointer;font-family:var(--font-body);
  transition:background .2s var(--ease-out),color .2s var(--ease-out),border-color .2s var(--ease-out),box-shadow .2s var(--ease-out);}
#listbtn:hover{background:var(--pink);color:var(--ink);border-color:var(--pink);box-shadow:0 0 20px var(--pink-glow);}

/* ===== class list grid ===== */
#grid{position:fixed;inset:0;z-index:10;background:rgba(7,9,15,.95);backdrop-filter:blur(6px);display:none;overflow-y:auto;padding:60px 5vw 40px;}
#grid.open{display:block;}
#grid h2{font-family:var(--font-mincho);font-weight:500;font-size:20px;color:var(--ivory);letter-spacing:.2em;margin-bottom:24px;}
#gridwrap{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:14px;max-width:1200px;}
.cell{background:var(--panel);border:1px solid var(--line);border-radius:2px;padding:16px 8px 12px;text-align:center;cursor:pointer;
  transition:border-color .2s var(--ease-out),transform .2s var(--ease-out),box-shadow .2s var(--ease-out),background .2s var(--ease-out);}
.cell:hover{background:rgba(26,36,64,.75);transform:translateY(-3px);border-color:var(--pink-deep);box-shadow:0 14px 34px rgba(0,0,0,.5),0 0 20px var(--pink-glow);}
.cell.now{border-color:var(--pink);box-shadow:0 0 0 1px var(--pink),0 0 18px var(--pink-glow);}
.cell img{width:58px;height:58px;object-fit:contain;}
.cell .cc{font-family:var(--font-display);font-size:11px;letter-spacing:.34em;color:var(--pink);margin-top:8px;}
.cell .cn{font-family:var(--font-mincho);font-size:12px;letter-spacing:.08em;color:var(--ivory);margin-top:2px;}
#gridclose{position:fixed;top:16px;right:20px;z-index:11;width:38px;height:38px;border-radius:50%;border:1px solid var(--line-strong);background:rgba(7,9,15,.8);color:var(--ivory);font-size:14px;cursor:pointer;transition:.2s;}
#gridclose:hover{background:var(--pink);color:var(--ink);border-color:var(--pink);}

@media (prefers-reduced-motion:reduce){
  *{animation-duration:1ms!important;transition-duration:1ms!important;}
}
@media (max-width:900px){

var cur = 0, imgIdx = 0, rotateTimer = null, turning = false;
var $ = function (id) { return document.getElementById(id); };

function setAccent(c) { document.documentElement.style.setProperty('--acc', c); }

function buildImgs(cls) {
  var box = $('charbox');
  box.innerHTML = '';
  if (cls.imgs.length > 1) {
    var g1 = document.createElement('img');
    g1.className = 'ghost g1';
    g1.src = '画像/character/' + cls.imgs[1];
    box.appendChild(g1);
  }
  if (cls.imgs.length > 2) {
    var g2 = document.createElement('img');
    g2.className = 'ghost g2';
    g2.src = '画像/character/' + cls.imgs[2];
    box.appendChild(g2);
  }
  for (var i = 0; i < cls.imgs.length; i++) {
    var im = document.createElement('img');
    im.className = 'main' + (i === 0 ? ' show' : '');
    im.src = '画像/character/' + cls.imgs[i];
    im.alt = cls.name;
    box.appendChild(im);
  }
  // アルファベットの上に重なる半透明コピー
  var veil = $('charveil');
  veil.innerHTML = '';
  var v = document.createElement('img');
  v.src = '画像/character/' + cls.imgs[0];
  v.alt = '';
  veil.appendChild(v);
  imgIdx = 0;
}

function rotate() {
  var cls = DATA[cur];
  if (cls.imgs.length < 2) return;
  var box = $('charbox');
  box.classList.remove('enter');
  var imgs = box.querySelectorAll('img.main');
  imgs[imgIdx].className = 'main';
  imgIdx = (imgIdx + 1) % imgs.length;
  imgs[imgIdx].className = 'main show';
  var vi = $('charveil').querySelector('img');
  if (vi) vi.src = imgs[imgIdx].src;
}

function setWeapon(cls, wi) {
  var tabs = $('weapons').children;
  for (var i = 0; i < tabs.length; i++) tabs[i].className = 'wtab' + (i === wi ? ' on' : '');
  $('intro').textContent = (cls.weapons[wi] && cls.weapons[wi].flavor) || '';
}

function setProfile(id, v) {
  var el = $(id);
  if (v) { el.textContent = v; el.className = ''; }
  else { el.textContent = '—'; el.className = 'empty'; }
}

/* 本をめくる: ページが倒れる裏で中身を差し替える */
function turn(dir, target) {
  if (turning) return;
  turning = true;
  var book = $('book');
  book.className = dir > 0 ? 'next' : 'prev';
  setTimeout(function () { paint(target); }, 240);
  setTimeout(function () { book.className = ''; turning = false; }, 800);
}

function paint(i) {
  cur = (i + DATA.length) % DATA.length;
  var cls = DATA[cur];
  setAccent(cls.accent);
  $('bg').style.background =
    'radial-gradient(ellipse at 66% 42%, ' + cls.accent + '44 0%, transparent 55%),' +
    'linear-gradient(120deg, ' + cls.accent + '22 0%, #07090f 60%)';
  $('code').textContent = cls.code;
  $('code').style.filter = 'drop-shadow(0 0 22px ' + cls.accent + '66)';
  $('codesmall').textContent = 'Class ' + ('0' + (cur + 1)).slice(-2);
  $('cname').textContent = cls.name;
  var bi = $('btnicon');
  if (cls.btn) { bi.src = '画像/class_button/' + cls.btn; bi.style.display = 'block'; }
  else { bi.style.display = 'none'; }

  setProfile('pfname', cls.charName);
  setProfile('pforigin', cls.origin);

  var w = $('weapons');
  w.innerHTML = '';
  cls.weapons.forEach(function (wp, wi) {
    var b = document.createElement('button');
    b.className = 'wtab';
    b.textContent = wp.name;
    b.onclick = function () { setWeapon(cls, wi); };
    w.appendChild(b);
  });
  setWeapon(cls, 0);

  $('cta').href = 'index.html#class=' + cls.code;
  $('counter').innerHTML = '<b>' + ('0' + (cur + 1)).slice(-2) + '</b> / ' + DATA.length;
  $('barfill').style.width = ((cur + 1) / DATA.length * 100) + '%';

  buildImgs(cls);
  var info = $('info'), box = $('charbox'), cl = $('codelayer');
  info.classList.remove('enter'); box.classList.remove('enter'); cl.classList.remove('enter');
  void info.offsetWidth;
  info.classList.add('enter'); box.classList.add('enter'); cl.classList.add('enter');

  if (rotateTimer) clearInterval(rotateTimer);
  rotateTimer = setInterval(rotate, 5000);

  [cur + 1, cur - 1].forEach(function (n) {
    var c2 = DATA[(n + DATA.length) % DATA.length];
    var pre = new Image();
    pre.src = '画像/character/' + c2.imgs[0];
  });
  markGrid();
}

function go(i) {
  var t = (i + DATA.length) % DATA.length;
  if (t === cur) return;
  var fwd = (t - cur + DATA.length) % DATA.length;
  turn(fwd <= DATA.length / 2 ? 1 : -1, t);
}

function buildGrid() {
  var g = $('gridwrap');
  DATA.forEach(function (cls, i) {
    var cell = document.createElement('div');
    cell.className = 'cell';
    cell.id = 'cell_' + i;
    var html = cls.btn ? '<img loading="lazy" src="画像/class_button/' + cls.btn + '" alt="">' : '';
    cell.innerHTML = html + '<div class="cc">' + cls.code + '</div><div class="cn">' + cls.name + '</div>';
    cell.onclick = function () { closeGrid(); go(i); };
    g.appendChild(cell);
  });
}
function markGrid() {
  for (var i = 0; i < DATA.length; i++) {
    var c = $('cell_' + i);
    if (c) c.className = 'cell' + (i === cur ? ' now' : '');
  }
}
function openGrid() { $('grid').className = 'open'; $('gridclose').style.display = 'block'; }
function closeGrid() { $('grid').className = ''; $('gridclose').style.display = 'none'; }

$('prev').onclick = function () { turn(-1, cur - 1); };
$('next').onclick = function () { turn(1, cur + 1); };
$('listbtn').onclick = openGrid;
$('gridclose').onclick = closeGrid;
document.addEventListener('keydown', function (e) {
  if (e.key === 'ArrowLeft') turn(-1, cur - 1);
  if (e.key === 'ArrowRight') turn(1, cur + 1);
  if (e.key === 'Escape') closeGrid();
});
var tx = null;
document.addEventListener('touchstart', function (e) { tx = e.touches[0].clientX; });
document.addEventListener('touchend', function (e) {
  if (tx === null) return;
  var dx = e.changedTouches[0].clientX - tx;
  if (dx > 60) turn(-1, cur - 1);
  if (dx < -60) turn(1, cur + 1);
  tx = null;
});

(function () {
  var m = (location.hash || '').match(/class=([A-Za-z]{2})/);
  var idx = 0;
  if (m) {
    for (var i = 0; i < DATA.length; i++) if (DATA[i].code === m[1].toUpperCase()) { idx = i; break; }
  }
  buildGrid();
  paint(idx);
})();
</script>
</body>
</html>
